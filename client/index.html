<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comando Central - Rota das Coisas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* TEMA FUTURISTA / GLASSMORPHISM */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff; text-align: center; padding: 20px; margin: 0; min-height: 100vh;
        }
        
        .header { margin-bottom: 40px; }
        .header h1 { 
            font-size: 2.5rem; font-weight: 300; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3); margin-bottom: 5px;
        }
        .header p { color: #4dd0e1; font-size: 1.1rem; letter-spacing: 1px; }

        .dashboard { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 30px; max-width: 1400px; margin: 0 auto;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
        }

        .titulo-box { text-align: left; }
        
        .card h3 { 
            margin: 0 0 8px 0; font-size: 1.4rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; 
        }

        /* ==========================================
           NOVAS BADGES DE ALERTA NEON
        ========================================== */
        .status-badge {
            display: inline-block; padding: 4px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .status-ok { 
            background: rgba(178, 255, 89, 0.1); color: #b2ff59; 
            border: 1px solid rgba(178, 255, 89, 0.3); 
        }
        .status-quente { 
            background: rgba(239, 71, 58, 0.2); color: #ff5252; 
            border: 1px solid #ff5252; box-shadow: 0 0 10px rgba(255, 82, 82, 0.4); 
        }
        .status-frio { 
            background: rgba(0, 229, 255, 0.2); color: #00e5ff; 
            border: 1px solid #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); 
        }

        .temp-destaque {
            font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        canvas { 
            max-width: 100%; background: rgba(0,0,0,0.15); border-radius: 10px; padding: 10px; margin-bottom: 20px;
        }

        .controles {
            display: flex; gap: 15px; justify-content: center; position: relative; z-index: 100;
        }

        button {
            flex: 1; padding: 12px 0; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; color: #fff; transition: all 0.3s ease;
        }
        .btn-resfriar { background: linear-gradient(45deg, #0083b0, #00b4db); }
        .btn-resfriar:hover { box-shadow: 0 0 20px rgba(0, 180, 219, 0.6); transform: translateY(-2px); }
        .btn-aquecer { background: linear-gradient(45deg, #cb2d3e, #ef473a); }
        .btn-aquecer:hover { box-shadow: 0 0 20px rgba(239, 71, 58, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌐 Comando Central IoT</h1>
        <p>Telemetria em Tempo Real & Controle Remoto de Atuadores</p>
    </div>

    <div class="dashboard" id="dashboard"></div>

    <script>
        const graficosAtivos = {};
        const cores = ['#00e5ff', '#b2ff59', '#ffff00', '#ff4081', '#e040fb'];
        const container = document.getElementById('dashboard');

        const fonteDeDados = new EventSource('http://localhost:8080/stream');

        fonteDeDados.onmessage = function(evento) {
            const historico = JSON.parse(evento.data);

            for (const idEquipamento in historico) {
                const leituras = historico[idEquipamento];
                if (!leituras || leituras.length === 0) continue;

                const ultimasLeituras = leituras.slice(-15);
                const labels = ultimasLeituras.map(l => {
                    const data = new Date(l.timestamp);
                    return `${data.getHours()}:${data.getMinutes()}:${data.getSeconds()}`;
                });
                
                const temperaturas = ultimasLeituras.map(l => l.temperatura);
                
                // Pegando a leitura mais recente com todos os dados
                const leituraAtual = ultimasLeituras[ultimasLeituras.length - 1];
                const tempAtual = leituraAtual.temperatura;
                
                // Lidando com a forma que o Go manda o JSON (pode ser min/max minúsculo ou maiúsculo)
                const tempMax = leituraAtual.temp_max || leituraAtual.TempMax;
                const tempMin = leituraAtual.temp_min || leituraAtual.TempMin;

                const nomeEquipamento = leituras[0].tipo_equipamento.toUpperCase() + " " + idEquipamento;
                const cor = cores[(idEquipamento - 1) % cores.length];

                // --- LÓGICA DO ALERTA ---
                let textoAlerta = "✅ Sistema Estável";
                let classeAlerta = "status-ok";

                if (tempAtual >= tempMax) {
                    textoAlerta = "⚠️ Resfriando (Limite Máx)";
                    classeAlerta = "status-quente";
                } else if (tempAtual <= tempMin) {
                    textoAlerta = "⚠️ Aquecendo (Limite Mín)";
                    classeAlerta = "status-frio";
                }

                if (!graficosAtivos[idEquipamento]) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.setProperty('--cor-lateral', cor);
                    
                    // Adicionamos a <div id="alerta_X"> logo abaixo do título!
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="titulo-box">
                                <h3 style="color: ${cor}">${nomeEquipamento}</h3>
                                <div id="alerta_${idEquipamento}" class="status-badge ${classeAlerta}">${textoAlerta}</div>
                            </div>
                            <div class="temp-destaque" id="temp_atual_${idEquipamento}">${tempAtual.toFixed(1)}°C</div>
                        </div>
                        <canvas id="grafico_${idEquipamento}"></canvas>
                        <div class="controles">
                            <button class="btn-resfriar" onclick="enviarComando(${idEquipamento}, 'resfriar')">❄️ Resfriar</button>
                            <button class="btn-aquecer" onclick="enviarComando(${idEquipamento}, 'aquecer')">🔥 Aquecer</button>
                        </div>
                    `;
                    container.appendChild(card);

                    document.styleSheets[0].insertRule(`.card:nth-child(${idEquipamento})::before { background: ${cor}; box-shadow: 0 0 15px ${cor}; }`, document.styleSheets[0].cssRules.length);

                    const ctx = document.getElementById(`grafico_${idEquipamento}`).getContext('2d');

                    graficosAtivos[idEquipamento] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Temperatura °C', data: temperaturas,
                                borderColor: cor, backgroundColor: cor + '22',
                                borderWidth: 2, tension: 0.3, fill: true,
                                pointRadius: 2, pointBackgroundColor: '#fff'
                            }]
                        },
                        options: {
                            animation: false, plugins: { legend: { display: false } },
                            scales: { 
                                y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#a6adc8' } },
                                x: { display: false }
                            }
                        }
                    });
                } else {
                    // --- ATUALIZA TUDO EM TEMPO REAL ---
                    document.getElementById(`temp_atual_${idEquipamento}`).innerText = `${tempAtual.toFixed(1)}°C`;
                    
                    // Atualiza a Badge de Alerta!
                    const badge = document.getElementById(`alerta_${idEquipamento}`);
                    badge.innerText = textoAlerta;
                    badge.className = `status-badge ${classeAlerta}`;

                    graficosAtivos[idEquipamento].data.labels = labels;
                    graficosAtivos[idEquipamento].data.datasets[0].data = temperaturas;
                    graficosAtivos[idEquipamento].update('none'); 
                }
            }
        };

        async function enviarComando(idEquipamento, acao) {
            console.warn(`[FRONTEND] Forçando ${acao.toUpperCase()} na Máquina ${idEquipamento}...`);
            try {
                await fetch('http://localhost:8080/comando', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ equipamento_id: idEquipamento, acao: acao })
                });
            } catch (erro) {
                console.error("Erro na rede:", erro);
            }
        }
    </script>
</body>
</html>
